<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Healthcare AI Login</title>
  <meta name="description" content="Healthcare AI Assistant secure login portal"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!--
    ╔══════════════════════════════════╗
    ║   PURE CSS BLOB MASCOT LOGIN     ║
    ║   No SVG · No images · No canvas ║
    ╚══════════════════════════════════╝

    Structure:
    .page-wrapper
    ├── .mascot-section
    │   └── .mascot          ← blob body (CSS border-radius shape)
    │       ├── .eyebrow (×2)
    │       ├── .eye-socket (×2)
    │       │   ├── .eyelid          ← covers pupil on "hide" action
    │       │   └── .pupil           ← JS moves this to track mouse
    │       ├── .blush (×2)
    │       ├── .mouth
    │       └── .arm (×2)   ← swing up to cover eyes on showPassword
    └── .login-section
        └── .card
            └── form
  -->

  <div class="page-wrapper">

    <!-- ── MASCOT ────────────────────────────── -->
    <section class="mascot-section" aria-hidden="true">

      <!-- Decorative floating bubbles behind mascot -->
      <div class="bubble b1"></div>
      <div class="bubble b2"></div>
      <div class="bubble b3"></div>

      <div class="mascot" id="mascot">

        <!-- Antenna -->
        <div class="antenna">
          <div class="antenna-ball"></div>
        </div>

        <!-- Eyebrows -->
        <div class="eyebrow eyebrow-left" id="ebL"></div>
        <div class="eyebrow eyebrow-right" id="ebR"></div>

        <!-- Left eye -->
        <div class="eye-socket eye-left">
          <div class="eyelid eyelid-top"></div>
          <div class="pupil" id="pupilL">
            <div class="pupil-shine"></div>
          </div>
        </div>

        <!-- Right eye -->
        <div class="eye-socket eye-right">
          <div class="eyelid eyelid-top"></div>
          <div class="pupil" id="pupilR">
            <div class="pupil-shine"></div>
          </div>
        </div>

        <!-- Blush marks -->
        <div class="blush blush-left"></div>
        <div class="blush blush-right"></div>

        <!-- Mouth -->
        <div class="mouth" id="mouth">
          <div class="mouth-inner"></div>
        </div>

        <!-- Stethoscope hanging from neck -->
        <div class="stethoscope">
          <div class="steth-tube"></div>
          <div class="steth-head"></div>
        </div>

        <!-- Arms (swing up to cover eyes) -->
        <div class="arm arm-left" id="armL">
          <div class="hand"></div>
        </div>
        <div class="arm arm-right" id="armR">
          <div class="hand"></div>
        </div>

      </div><!-- /.mascot -->

      <p class="mascot-label">MediBot — Your AI Assistant</p>
    </section>

    <!-- ── LOGIN CARD ─────────────────────────── -->
    <main class="login-section">
      <div class="card">

        <header class="card-header">
          <div class="logo-dot"></div>
          <h1>Welcome Back</h1>
          <p>Healthcare AI Portal</p>
        </header>

        <form id="login-form" novalidate>

          <div class="field-group">
            <label for="email">Email Address</label>
            <div class="input-wrap">
              <span class="field-icon">✉</span>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="doctor@hospital.com"
                autocomplete="email"
                spellcheck="false"
              />
            </div>
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <span class="field-icon">🔑</span>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
              />
              <button
                type="button"
                id="toggle-pass"
                class="toggle-pass"
                aria-label="Show password"
                title="Toggle password visibility"
              >
                <!-- Pure CSS eye icon via text character -->
                <span id="eye-glyph">👁</span>
              </button>
            </div>
          </div>

          <div class="forgot-row">
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="submit-btn" id="submit-btn">
            Sign In to Portal
          </button>

        </form>

        <footer class="card-footer">
          <p>Don't have an account? <a href="#">Request Access</a></p>
        </footer>

      </div>
    </main>

  </div><!-- /.page-wrapper -->

  <script src="script.js"></script>
</body>
</html>
